<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منى ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: Tahoma;
    direction: rtl;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
}

/* الخلفية */
.background span {
    position: absolute;
    width: 15px;
    height: 15px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    animation: move linear infinite;
}

@keyframes move {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}

/* الكارت */
.card {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 600px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
    text-align: center;
}

/* العنوان */
h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

/* الكتابة */
.typing {
    font-size: 20px;
    min-height: 60px;
    margin-bottom: 20px;
}

/* slider */
.slider {
    position: relative;
    width: 100%;
    max-width: 400px;
    aspect-ratio: 1 / 1;
    margin: 20px auto;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.slider img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* دي أهم سطر */
    
    width: 100%;
    height: 100%;
    object-fit: cover;

    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slider img.active {
    opacity: 1;
}

/* الزر */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    font-size: 18px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
}

/* انفجار القلوب */
.explosion {
    position: absolute;
    font-size: 20px;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}

</style>
</head>

<body>

<div class="background" id="bg"></div>

<div class="card">
    <h1>إلى منى ❤️</h1>

    <div class="typing" id="typing"></div>

    <div class="slider">
        <img src="img1.jpeg" class="active">
        <img src="img2.jpeg">
        <img src="img3.jpeg">
    </div>

    <button onclick="love()">اضغطي هنا 💖</button>
</div>

<!-- 🎶 الأغنية -->
<audio id="music" loop>
    <source src="1.mp3" type="audio/mpeg">
</audio>

<script>

/* كتابة تدريجية */
const text = "بصراحة كده… أنا كنت عايش عادي، لحد ما إنتي دخلتي حياتي وبوظتي النظام خالص 💖😂";
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 50);
    }
}
type();

/* slider شغال 100% */
let index = 0;
const images = document.querySelectorAll(".slider img");

setInterval(() => {
    images[index].classList.remove("active");
    index = (index + 1) % images.length;
    images[index].classList.add("active");
}, 2500);

/* خلفية */
for (let i = 0; i < 40; i++) {
    let span = document.createElement("span");
    span.style.left = Math.random() * 100 + "vw";
    span.style.animationDuration = (5 + Math.random() * 15) + "s";
    document.getElementById("bg").appendChild(span);
}

/* زر الحب */
function love() {

    document.getElementById("music").play();

    for (let i = 0; i < 30; i++) {
        let heart = document.createElement("div");
        heart.className = "explosion";
        heart.innerHTML = "❤️";

        heart.style.left = "50%";
        heart.style.top = "60%";

        heart.style.setProperty("--x", (Math.random()*400-200)+"px");
        heart.style.setProperty("--y", (Math.random()*400-200)+"px");

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 1000);
    }
}

</script>

</body>
</html>
